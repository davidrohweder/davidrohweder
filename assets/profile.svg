<text x="72" y="112" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="16.5" fill="#a4a8b0">I'm a software engineer at Iridium, building automated test suites, CI/CD pipelines, and full-stack</text>
<text x="72" y="139" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="16.5" fill="#a4a8b0">apps that run over a global satellite network. I care about clean systems, fast feedback loops, and</text>
<text x="72" y="166" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="16.5" fill="#a4a8b0">tools other engineers actually want to use.</text>
