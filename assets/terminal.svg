<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-label="Terminal: whoami — David Rohweder, software builder in Phoenix. A maker driven by curiosity, into desert trails, muay thai, and good tacos.">
